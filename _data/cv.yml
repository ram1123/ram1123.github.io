- title: Research Interests
  type: list
  contents:
    - Higgs physics, vector boson scattering, effective field theory, and precision electroweak measurements
    - Detector development for CMS, including GEM technologies, HGCAL studies, and high-level trigger performance
    - Machine learning for collider physics and broader societal applications of detector technologies

