- title: Research Experience
  type: time_table
  contents:
    - title: Postdoctoral Research Associate
      institution: Purdue University, Indiana, USA
      year: Jan 2025 - Present
      description:
        - "[ONGOING] Lead analyst for Higgs boson decay to muon pairs, working with a Ph.D. student toward an expected Summer 2026 publication."
        - "[ONGOING] Assessing and improving the performance of high-transverse-momentum muons."
        - "[ONGOING] Continuing the high-mass Higgs search in ZZ to 2l2q and 2l2nu with full Run-2 CMS data; main analyzer and contact person for HIG-23-001."
        - "[ONGOING] Leading the resonant Higgs boson pair search in the WWgg final state and supervising a graduate student; responsible for the statistical combination in B2G-24-010."
    - title: Postdoctoral Researcher
      institution: IHEP Beijing and CERN, Geneva, Switzerland
      year: Dec 2019 - Dec 2024
      description:
        - "Worked on HGCAL sensor studies for the HL-LHC, including validation of non-irradiated sensors, studies of irradiated sensors, and leakage-current compensation using HGCROC input DACs."
        - "Main analyzer for the fully hadronic channel in non-resonant Higgs boson pair production in WWgg; responsible for data-driven background estimation, DNN-based signal extraction, and documentation for CMS-PAS-HIG-21-014."
        - "Contributed to differential cross-section measurements in H to 4l, introduced the n-jettiness observable, and expanded the interpretation with MadGraph_aMCatNLO and heavy-quark coupling constraints."
        - "Helped establish the first CMS evidence for semileptonic WW/WZ vector boson scattering with 4.4 sigma observed significance."
        - "Led CPPF data quality monitoring development for the CMS Level-1 trigger online DQM."
    - title: EGamma HLT Group Coordinator
      institution: IHEP Beijing and CMS Collaboration
      year: Oct 2020 - Aug 2022
      description:
        - "Served as CMS L3 EGamma HLT subgroup convener for Run-3 and HL-LHC preparations."
        - "Optimized electron and photon HLT energy regression, identification, isolation, and data-to-simulation scale factors."
        - "Streamlined selection criteria to improve Run-3 performance relative to Run-2."
    - title: Ph.D. Student / Researcher
      institution: University of Delhi, Delhi, India and CERN, Geneva, Switzerland
      year: Oct 2012 - Nov 2019
      description:
        - "Sole analyst for the anomalous electroweak production search in semileptonic diboson final states, setting world-leading aQGC limits at the time."
        - "Contributed to the CMS GE1/1 GEM upgrade through detector assembly, characterization, beam tests, and laboratory setup at the University of Delhi."
        - "Corresponding author on the first GEM foils produced in India and led offline beam-test alignment studies that improved efficiency."

